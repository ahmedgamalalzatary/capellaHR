name: capellahr

services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    command:
      - --innodb-buffer-pool-size=256M
      - --max-connections=50
      - --performance-schema=OFF
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:?MYSQL_DATABASE is required}
      MYSQL_USER: ${MYSQL_USER:?MYSQL_USER is required}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      TZ: Africa/Cairo
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "MYSQL_PWD=$$MYSQL_ROOT_PASSWORD mysqladmin ping --host=127.0.0.1 --user=root --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    mem_limit: 768m
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  migrate:
    image: capella-hr-migrate:latest
    build:
      context: .
      dockerfile: dockerfile.api
      target: migration
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    restart: "no"

  api:
    image: capella-hr-api:latest
    build:
      context: .
      dockerfile: dockerfile.api
      target: runtime
    restart: unless-stopped
    init: true
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      API_PORT: 4000
      REPORT_FILES_ROOT: /app/uploads/reports
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - 127.0.0.1:4020:4000
    volumes:
      - employee_uploads:/app/uploads
    networks:
      - internal
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/api/v1/health/ready').then((response) => { if (!response.ok) process.exit(1) }).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s
    mem_limit: 384m
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  worker:
    image: capella-hr-worker:latest
    build:
      context: .
      dockerfile: dockerfile.api
      target: worker-runtime
    restart: unless-stopped
    init: true
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      APP_TIME_ZONE: Africa/Cairo
      REPORT_WORKER_POLL_MS: ${REPORT_WORKER_POLL_MS:-2000}
      REPORT_FILES_ROOT: /app/uploads/reports
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - employee_uploads:/app/uploads
    networks:
      - internal
    mem_limit: 384m
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  web:
    image: capella-hr-web:latest
    build:
      context: .
      dockerfile: dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL is required}
    restart: unless-stopped
    init: true
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    depends_on:
      api:
        condition: service_healthy
    ports:
      - 127.0.0.1:3020:3000
    networks:
      - internal
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/').then((response) => { if (!response.ok) process.exit(1) }).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s
    mem_limit: 384m
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

networks:
  internal:
    name: capellahr_internal_v2

volumes:
  mysql_data:
    name: capellahr_mysql_data_v2
  employee_uploads:
    name: capellahr_employee_uploads_v2
